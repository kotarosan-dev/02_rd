<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoho CRM Three.js Widget Demos</title>
    <script src="https://live.zwidgets.com/js-sdk/1.5/ZohoEmbededAppSDK.min.js"></script>
    <script src="js/zoho-mock.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <script type="module" src="js/main.js"></script>
  </head>
  <body>
    <div class="widget-shell">
      <header class="toolbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <p class="eyebrow">Zoho CRM Widget</p>
            <h1>Three CRM Lens</h1>
          </div>
        </div>
        <nav id="demoTabs" class="demo-tabs" aria-label="Demo modes"></nav>
        <button id="refreshButton" class="icon-button" type="button" title="再読み込み" aria-label="再読み込み">↻</button>
      </header>

      <main class="workspace">
        <section class="stage-panel" aria-label="3D CRM visualization">
          <canvas id="crmCanvas"></canvas>
          <div class="scene-caption">
            <p id="sceneTitle"></p>
            <span id="sceneStatus"></span>
          </div>
        </section>

        <aside class="inspector" aria-label="CRM summary">
          <section class="summary-block">
            <p class="block-label">Context</p>
            <dl id="contextList" class="info-list"></dl>
          </section>
          <section class="summary-block">
            <p class="block-label">Metrics</p>
            <dl id="metricList" class="info-list"></dl>
          </section>
          <section class="summary-block ai-block">
            <div class="block-heading">
              <p class="block-label">AI Insight</p>
              <span id="aiInsightStatus" class="status-pill">Pending</span>
            </div>
            <p id="aiInsightSummary" class="ai-summary">Loading insight...</p>
            <ol id="aiRiskList" class="ai-list"></ol>
            <ul id="aiQuestionList" class="ai-list question-list"></ul>
          </section>
          <section class="summary-block agent-block">
            <div class="block-heading">
              <p class="block-label">Managed Agent</p>
              <span id="agentProbeStatus" class="status-pill">Not tested</span>
            </div>
            <button id="agentProbeButton" class="action-button" type="button">Probe access</button>
            <p id="agentProbeResult" class="ai-summary">Claude Managed Agents の beta API 接続を確認します。</p>
          </section>
          <section class="summary-block">
            <p class="block-label">Records</p>
            <ol id="recordList" class="record-list"></ol>
          </section>
        </aside>
      </main>
    </div>
  </body>
</html>
